name: Ghost Inspector sync

on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GHOST_INSPECTOR_API_KEY: ${{ secrets.GHOST_INSPECTOR_API_KEY }}
      GHOST_INSPECTOR_FOLDER_ID: ${{ vars.GHOST_INSPECTOR_FOLDER_ID || secrets.GHOST_INSPECTOR_FOLDER_ID }}
      GHOST_INSPECTOR_ORG_ID: ${{ vars.GHOST_INSPECTOR_ORG_ID || secrets.GHOST_INSPECTOR_ORG_ID }}
      GHOST_INSPECTOR_SUITE_URL_TEMPLATE: ${{ vars.GHOST_INSPECTOR_SUITE_URL_TEMPLATE || secrets.GHOST_INSPECTOR_SUITE_URL_TEMPLATE }}
      GHOST_INSPECTOR_EXPORT_URL_TEMPLATE: ${{ vars.GHOST_INSPECTOR_EXPORT_URL_TEMPLATE || secrets.GHOST_INSPECTOR_EXPORT_URL_TEMPLATE }}
      GHOST_INSPECTOR_FOLDER_URL_TEMPLATE: ${{ vars.GHOST_INSPECTOR_FOLDER_URL_TEMPLATE || secrets.GHOST_INSPECTOR_FOLDER_URL_TEMPLATE }}
      GHOST_INSPECTOR_EXTRA_TEST_IDS: ${{ vars.GHOST_INSPECTOR_EXTRA_TEST_IDS || secrets.GHOST_INSPECTOR_EXTRA_TEST_IDS }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Run Ghost Inspector sync script
        run: |
          node ./scripts/ghostinspector-sync.js

      - name: Annotate exported tests with Ghost Inspector IDs
        run: |
          node ./scripts/ghostinspector-test-index.js

      - name: Check for changes
        id: check
        run: |
          if git status --porcelain | grep -q .; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Push branch with changes
        if: steps.check.outputs.changed == 'true'
        env:
          BRANCH: ghostinspector-sync-${{ github.run_number }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add -A
          git commit -m "chore: sync Ghost Inspector suites #${{ github.run_number }}"
          git push origin "$BRANCH"
          echo "Branch $BRANCH pushed. Open a PR against main:" >> "$GITHUB_STEP_SUMMARY"
          echo "https://github.com/${{ github.repository }}/pull/new/$BRANCH" >> "$GITHUB_STEP_SUMMARY"
