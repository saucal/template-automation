name: Ghost Inspector full-org extraction

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  extract:
    runs-on: ubuntu-latest
    env:
      GHOST_INSPECTOR_API_KEY: ${{ secrets.GHOST_INSPECTOR_API_KEY }}
      GHOST_INSPECTOR_ORG_ID: ${{ vars.GHOST_INSPECTOR_ORG_ID || secrets.GHOST_INSPECTOR_ORG_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Unit-test extraction helpers
        run: node --test scripts/ghostinspector-extract-all.test.js

      - name: Run full-org Ghost Inspector extraction
        run: node ./scripts/ghostinspector-extract-all.js

      - name: Check for changes
        id: check
        run: |
          if git status --porcelain | grep -q .; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Create pull request with changes
        if: steps.check.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: ghostinspector-extract-all-${{ github.run_number }}
          commit-message: "chore: full-org Ghost Inspector extraction #${{ github.run_number }}"
          title: "chore: full-org Ghost Inspector extraction #${{ github.run_number }}"
          body: |
            Automated full-organization extraction of Ghost Inspector suites.
            Walks every folder + suite + test in the org, nests output by folder under suites/,
            bakes _gi {testId, suiteId, suiteName} into each test JSON (no separate annotate step),
            and saves organization variables to suites/_organization.json.
          base: main
