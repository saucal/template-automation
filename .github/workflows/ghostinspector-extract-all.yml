name: Ghost Inspector full-org extraction

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  extract:
    runs-on: ubuntu-latest
    env:
      GHOST_INSPECTOR_API_KEY: ${{ secrets.GHOST_INSPECTOR_API_KEY }}
      GHOST_INSPECTOR_ORG_ID: ${{ vars.GHOST_INSPECTOR_ORG_ID || secrets.GHOST_INSPECTOR_ORG_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Unit-test extraction helpers
        run: node --test scripts/ghostinspector-extract-all.test.js

      - name: Run full-org Ghost Inspector extraction
        run: node ./scripts/ghostinspector-extract-all.js

      - name: Check for changes
        id: check
        run: |
          if git status --porcelain | grep -q .; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Push branch with changes
        if: steps.check.outputs.changed == 'true'
        env:
          BRANCH: ghostinspector-extract-all-${{ github.run_number }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add -A
          git commit -m "chore: full-org Ghost Inspector extraction #${{ github.run_number }}"
          git push origin "$BRANCH"
          echo "Branch $BRANCH pushed. Open a PR against main:" >> "$GITHUB_STEP_SUMMARY"
          echo "https://github.com/${{ github.repository }}/pull/new/$BRANCH" >> "$GITHUB_STEP_SUMMARY"
